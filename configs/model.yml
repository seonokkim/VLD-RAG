# Model registry
#
# Use relative local paths or remote model identifiers.
# Leave local_path empty if the model should be resolved by model_id.

defaults:
  device: cuda
  dtype: float32
  trust_remote_code: false

retrieval:
  hyde:
    enabled: false
    n: 1
    include_original_query: false

  sparse:
    bm25:
      enabled: true
      class_name: BM25Retriever
      top_k: 5

  dense:
    colpali:
      enabled: false
      model_id: vidore/colpali-v1.2
      local_path: ./models/colpali
      processor_id: vidore/colpali-v1.2
      device: cuda
      dtype: float32
      trust_remote_code: false

    text_embedding:
      enabled: false
      text_encoder: text-embedding-3-large
      embedding_mode: single_vector
      source: auto

llm:
  qwen3_vl_4b_instruct:
    enabled: false
    model_id: Qwen/Qwen3-VL-4B-Instruct
    local_path: ./models/qwen_vl
    device: cuda
    dtype: float16
    max_new_tokens: 512
    temperature: 0.0
    trust_remote_code: false

  internvl3_5_4b:
    enabled: false
    model_id: OpenGVLab/InternVL3_5-4B
    local_path: ./models/internvl
    device: cuda
    dtype: float16
    max_new_tokens: 512
    temperature: 0.0
    trust_remote_code: false

runtime:
  cache_dir: ./models/cache
  allow_remote_download: false
